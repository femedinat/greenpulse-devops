spring.application.name=greenpulse
spring.profiles.active=${SPRING_PROFILES_ACTIVE:staging}

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:greenpulse}
spring.datasource.username=${DB_USER:greenpulse}
spring.datasource.password=${DB_PASSWORD:greenpulse123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
