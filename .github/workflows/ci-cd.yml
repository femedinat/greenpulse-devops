name: GreenPulse CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  JAVA_VERSION: "17"

permissions:
  contents: read

jobs:
  ci:
    name: CI - Build and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java and Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and run tests
        run: mvn clean verify

  deploy-staging:
    name: CD - Deploy Staging
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "full=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.full }}:staging-${{ github.sha }}
            ${{ steps.image.outputs.full }}:staging-latest
          labels: |
            org.opencontainers.image.title=GreenPulse
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Staging image (branch develop)

      - name: Staging deploy summary
        run: |
          echo "Imagem publicada no GHCR (ambiente staging / branch develop)."
          echo "Tags: staging-${{ github.sha }}, staging-latest"
          echo "Profile Spring esperado na aplicacao: staging"

  deploy-production:
    name: CD - Deploy Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "full=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.full }}:prod-${{ github.sha }}
            ${{ steps.image.outputs.full }}:prod-latest
            ${{ steps.image.outputs.full }}:latest
          labels: |
            org.opencontainers.image.title=GreenPulse
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Production image (branch main)

      - name: Production deploy summary
        run: |
          echo "Imagem publicada no GHCR (ambiente production / branch main)."
          echo "Tags: prod-${{ github.sha }}, prod-latest, latest"
          echo "Profile Spring esperado na aplicacao: prod"
